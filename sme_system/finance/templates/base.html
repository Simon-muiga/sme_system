<!DOCTYPEV html>
<html lang="en">   
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SME Finance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #d6dbe2;
        }
        .sidebar{
            height: 100vh;
            background: #172839;
            color: white;
            padding-top: 20px;
            position: fixed;
            width: 230px;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }

        .sidebar a:hover {
            background: #343a40;
            color: white;
        }
        .main-content {
            margin-left: 230px;
            padding: 30px;
        }

        .brand {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
        }

    </style>

</head>

<body>

    <!-- Sidebar -->
     <div class="sidebar">
        <div class="brand">
            SME Finance
        </div>

        <a href="{% url 'dashboard' %}">Dashboard</a>

        <a href="{% url 'add_sale' %}">Add Sale</a>

        <a href="{% url 'add_expense' %}">Add Expense</a>

        <a href="{% url 'download_report' %}">Reports</a>

        <hr>

        <a href="{% url 'logout' %}">Logout</a>

    </div>

    <!-- Main-Content -->

    <div class="main-content">

        {% block content %}

        {% endblock %}

        </div>

</body>

</html>

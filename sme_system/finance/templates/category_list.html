{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
<h2>Categories</h2>

<a href="{% url 'add_category' %}" class="btn btn-success mb-3">+ Add Category</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for c in categories %}
        <tr>
            <td>{{ c.name }}</td>
            <td>{{ c.get_category_type_display }}</td>
            <td>
                <a href="{% url 'edit_category' c.id %}" class="btn btn-warning btn-sm">Edit</a>
                <a href="{% url 'delete_category' c.id %}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure?');">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3" class="text-center">No categories yet</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>

{% endblock %}
